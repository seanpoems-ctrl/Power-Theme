# 盤前掃描：週一～五 08:05 AM ET（13:05 UTC 冬令 / 12:05 UTC 夏令）
name: Pre-Market Gapper Scan

on:
  schedule:
    - cron: "5 13 * * 1-5"   # 冬令 08:05 ET；夏令對應 09:05 ET（仍在盤前）
  workflow_dispatch: {}

jobs:
  gapper-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check NYSE trading day
        id: trading_day
        run: |
          pip install exchange-calendars -q
          python - <<'EOF'
          import exchange_calendars as xcals
          from datetime import date
          nyse = xcals.get_calendar("XNYS")
          today = date.today().isoformat()
          is_session = nyse.is_session(today)
          print(f"is_trading_day={'true' if is_session else 'false'}")
          with open("$GITHUB_OUTPUT", "a") as f:
              f.write(f"is_trading_day={'true' if is_session else 'false'}\n")
          EOF

      - uses: actions/setup-python@v5
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          python-version: "3.12"

      - name: Install Python deps
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: pip install requests tradingview-screener google-genai exchange-calendars python-dotenv

      - name: Run gapper scanner
        if: steps.trading_day.outputs.is_trading_day == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gapper_service.py

      - uses: actions/setup-node@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          node-version: 18

      - run: npm install --legacy-peer-deps
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - name: Build React app
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: npm run build
        env:
          CI: false

      - uses: actions/configure-pages@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          path: ./build

      - id: deployment
        if: steps.trading_day.outputs.is_trading_day == 'true'
        uses: actions/deploy-pages@v4

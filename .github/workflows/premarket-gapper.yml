# 盤前掃描：開盤前 30 分鐘（09:00 AM ET = 13:00 UTC 夏令 / 14:00 UTC 冬令）
name: Pre-Market Gapper Scan

on:
  schedule:
    - cron: "0 13 * * 1-5"   # 夏令 09:00 ET；冬令 08:00 ET（仍在盤前）
    - cron: "0 14 * * 1-5"   # 冬令 09:00 ET 備援
  workflow_dispatch: {}

jobs:
  gapper-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check NYSE trading day
        id: trading_day
        run: |
          pip install exchange-calendars -q
          python - <<'EOF'
          import exchange_calendars as xcals, os
          from datetime import date
          nyse = xcals.get_calendar("XNYS")
          today = date.today().isoformat()
          is_session = nyse.is_session(today)
          print(f"is_trading_day={'true' if is_session else 'false'}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_trading_day={'true' if is_session else 'false'}\n")
          EOF

      - uses: actions/setup-python@v5
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          python-version: "3.12"

      - name: Install Python deps
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: pip install requests beautifulsoup4 tradingview-screener google-genai exchange-calendars python-dotenv

      - name: Run gapper scanner
        if: steps.trading_day.outputs.is_trading_day == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gapper_service.py

      - uses: actions/setup-node@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          node-version: 18

      - run: npm install --legacy-peer-deps
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - name: Build React app
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: npm run build
        env:
          CI: false

      - uses: actions/configure-pages@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          path: ./build

      - id: deployment
        if: steps.trading_day.outputs.is_trading_day == 'true'
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure()
        run: |
          gh issue create \
            --title "⚠️ Pre-Market Gapper 失敗 $(date -u +%Y-%m-%d)" \
            --body "盤前掃描失敗，網頁未更新。請查看：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Earnings Monitor

on:
  workflow_dispatch: {}
  schedule:
    # Earnings monitor: Every 30 min during US market hours only (9:30 AM–5:30 PM ET)
    # 13:00-21:30 UTC = 9 AM–5:30 PM ET (covers pre-open + after-hours earnings)
    # Earnings move stocks — only relevant when market is active
    - cron: '0,30 13-21 * * 1-5'   # Mon-Fri, 18 runs/day (~36 min/day)

jobs:
  earnings-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-earnings-monitor-v1

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Monitor earnings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python earnings_monitor.py

      - name: Commit earnings alerts
        run: |
          git config user.name "seanpoems-ctrl"
          git config user.email "seanpoems-ctrl@github.com"
          git add -A data/earnings_alerts/ public/earnings_reports/
          git commit -m "data: earnings monitoring $(date -u +'%Y-%m-%d %H:%M')" || true
          git push origin main || true

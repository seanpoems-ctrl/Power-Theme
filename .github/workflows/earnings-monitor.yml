name: Earnings Monitor

on:
  workflow_dispatch: {}
  schedule:
    # Every 15 minutes during user's waking hours (Malaysia timezone)
    # User awake: 7 AM - 2 AM Malaysia = 23:00 UTC - 18:00 UTC next day
    # SKIP sleep window: 2 AM - 7 AM Malaysia = 18:00-23:00 UTC
    - cron: '0,15,30,45 23 * * *'      # 11 PM - 11:45 PM UTC (7 AM Malaysia start)
    - cron: '0,15,30,45 0-17 * * *'    # Midnight - 5 PM UTC (night to next afternoon)

jobs:
  earnings-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-earnings-monitor-v1

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Monitor earnings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python earnings_monitor.py

      - name: Commit earnings alerts
        run: |
          git config user.name "seanpoems-ctrl"
          git config user.email "seanpoems-ctrl@github.com"
          git add -A data/earnings_alerts/ public/earnings_reports/
          git commit -m "data: earnings monitoring $(date -u +'%Y-%m-%d %H:%M')" || true
          git push origin main || true

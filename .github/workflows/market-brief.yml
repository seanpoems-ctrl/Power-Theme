name: Market Brief (AM + PM)

on:
  schedule:
    - cron: "17 12 * * 1-5"   # 08:17 ET (EDT/UTC-4) | 07:17 ET (EST/UTC-5)
    - cron: "3 21 * * 1-5"    # 17:03 ET (EDT/UTC-4) | 16:03 ET (EST/UTC-5)
  workflow_dispatch: {}

jobs:
  market-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      is_trading_day: ${{ steps.trading_day.outputs.is_trading_day }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install requests yfinance pandas python-dotenv google-genai \
                      tradingview-screener exchange-calendars

      - name: Check trading day
        id: trading_day
        run: |
          python - <<'EOF'
          import exchange_calendars as xcals, os
          from datetime import date
          nyse = xcals.get_calendar("XNYS")
          is_session = nyse.is_session(date.today().isoformat())
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_trading_day={'true' if is_session else 'false'}\n")
          EOF

      - name: Run Market Brief
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: python market_brief.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit market brief data to repo
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/market_brief.json
          git diff --staged --quiet || git commit -m "data: market_brief $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
          for i in 1 2 3; do git pull --rebase --autostash && git push && break || sleep 5; done

  deploy:
    needs: market-brief
    if: needs.market-brief.outputs.is_trading_day == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build React app
        run: npm install --legacy-peer-deps && npm run build
        env:
          CI: false

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - id: deployment
        uses: actions/deploy-pages@v4

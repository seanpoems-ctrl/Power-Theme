name: Market Intelligence Engine

on:
  schedule:
    - cron: "30 12 * * 1-5"   # 07:30 ET (UTC-5 / EST)
    - cron: "30 21 * * 1-5"   # 16:30 ET (UTC-5 / EST)
  workflow_dispatch: {}

jobs:
  market-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install requests yfinance pandas python-dotenv google-genai \
                      tradingview-screener exchange-calendars beautifulsoup4

      - name: Check trading day
        id: trading_day
        run: |
          python - <<'EOF'
          import exchange_calendars as xcals, os
          from datetime import date
          nyse = xcals.get_calendar("XNYS")
          is_session = nyse.is_session(date.today().isoformat())
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_trading_day={'true' if is_session else 'false'}\n")
          EOF

      - name: Run Market Intelligence Engine
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: python market_intelligence.py
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Build React app
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: npm ci && npm run build
        env:
          CI: false

      - uses: actions/configure-pages@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          path: ./build

      - id: deployment
        if: steps.trading_day.outputs.is_trading_day == 'true'
        uses: actions/deploy-pages@v4

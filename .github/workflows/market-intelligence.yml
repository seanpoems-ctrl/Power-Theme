name: Market Intelligence Engine

on:
  schedule:
    - cron: "30 12 * * *"     # 07:30 ET (UTC-5 / EST) — runs every day including weekends/holidays
    - cron: "30 21 * * *"     # 16:30 ET (UTC-5 / EST) — runs every day including weekends/holidays
  workflow_dispatch: {}

jobs:
  market-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      is_trading_day: ${{ steps.trading_day.outputs.is_trading_day }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install requests httpx yfinance pandas python-dotenv google-genai \
                      tradingview-screener beautifulsoup4

      - name: Always run — no trading day restriction
        id: trading_day
        run: |
          python - <<'EOF'
          import os
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("is_trading_day=true\n")
          EOF

      - name: Run Market Briefing Engine
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: python market_briefing_engine.py auto
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit market intelligence data to repo
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/market_intelligence.json public/market_briefs.json || true
          git diff --staged --quiet || git commit -m "data: market_intelligence $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
          for i in 1 2 3; do git pull --rebase --autostash && git push && break || sleep 5; done

  deploy:
    needs: market-intel
    if: needs.market-intel.outputs.is_trading_day == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build React app
        run: npm install --legacy-peer-deps && npm run build
        env:
          CI: false
          REACT_APP_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - id: deployment
        uses: actions/deploy-pages@v4

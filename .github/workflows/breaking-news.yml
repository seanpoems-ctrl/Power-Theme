name: Emergency News Monitor

on:
  workflow_dispatch: {}
  # Schedule removed — triggered externally via cron-job.org every 5 minutes

concurrency:
  group: breaking-news
  cancel-in-progress: true  # Cancel queued run — seen_keys are committed after each run

jobs:
  breaking-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-breaking-news-v1
          restore-keys: pip-breaking-news-

      - name: Install deps
        run: pip install requests python-dotenv google-genai beautifulsoup4

      - name: Run Emergency News Monitor
        run: python breaking_news.py
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit breaking news data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/breaking_news.json
          git diff --staged --quiet || git commit -m "data: breaking_news $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
          for i in 1 2 3; do git pull --rebase --autostash && git push && break || sleep 5; done

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-

      - name: Build React app
        run: npm ci --legacy-peer-deps && npm run build
        env:
          CI: false
          REACT_APP_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - id: deployment
        uses: actions/deploy-pages@v4

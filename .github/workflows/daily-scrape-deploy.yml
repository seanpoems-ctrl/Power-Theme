# 平日關盤後 1.5 小時：跑爬蟲 → build → 部署 GitHub Pages
# 美東 17:30 = 21:30 UTC 夏令；冬令 17:30 EST = 22:30 UTC
name: Daily scrape & deploy

on:
  schedule:
    - cron: "30 21 * * 1-5"  # 夏令 17:30 ET（關盤後 1.5h）
    - cron: "30 22 * * 1-5"  # 冬令 17:30 ET 備援
  workflow_dispatch: {}

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install requests beautifulsoup4 exchange-calendars yfinance lxml

      - name: Check NYSE trading day
        id: trading_day
        run: |
          python - <<'EOF'
          import exchange_calendars as xcals, os
          from datetime import date
          nyse = xcals.get_calendar("XNYS")
          today = date.today().isoformat()
          if nyse.is_session(today):
              print("is_trading_day=true")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("is_trading_day=true\n")
          else:
              print(f"Skipping — {today} is not a NYSE trading day")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("is_trading_day=false\n")
          EOF

      # Finviz 偶爾限流／擋 IP：失敗則等幾分鐘再掃，最多 4 次
      - name: Run scraper (retry on failure)
        if: steps.trading_day.outputs.is_trading_day == 'true'
        env:
          CI: true
        run: |
          for attempt in 1 2 3 4; do
            echo "=== Scraper attempt $attempt / 4 ==="
            if python scraper.py; then
              echo "Scraper OK"
              exit 0
            fi
            if [ "$attempt" -lt 4 ]; then
              echo "Failed — waiting 3 minutes before retry..."
              sleep 180
            fi
          done
          echo "Scraper failed after 4 attempts"
          exit 1

      - uses: actions/setup-node@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          node-version: 18

      - run: npm install --legacy-peer-deps
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - name: Build React app
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: npm run build
        env:
          CI: false

      - uses: actions/configure-pages@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          path: ./build

      - id: deployment
        if: steps.trading_day.outputs.is_trading_day == 'true'
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure()
        run: |
          gh issue create \
            --title "⚠️ 盤後 Thematic Scanner 失敗 $(date -u +%Y-%m-%d)" \
            --body "盤後爬蟲或部署失敗，網頁未更新。請查看：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

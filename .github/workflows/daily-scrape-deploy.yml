# Thematic Scanner — runs at 4:35 PM ET Mon–Fri via GitHub cron
# EDT: 20:35 UTC | EST: 21:35 UTC (both schedules active to cover DST)
# workflow_dispatch bypasses ET-window check (manual trigger)
name: Daily scrape & deploy

on:
  workflow_dispatch: {}
  schedule:
    - cron: "35 20 * * 1-5"   # 4:35 PM EDT (Mar–Nov)
    - cron: "35 21 * * 1-5"   # 4:35 PM EST (Nov–Mar)

concurrency:
  group: thematic-scrape
  cancel-in-progress: false  # Queue — scraper takes ~10 min, cancelling would prevent completion

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      pages: write
      id-token: write
      issues: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-scraper-v1
          restore-keys: pip-scraper-

      - name: Install Python deps
        run: pip install requests beautifulsoup4 yfinance lxml exchange_calendars pandas google-genai tradingview_screener python-dotenv ib_insync

      - name: Check ET window (9:00 AM – 5:00 PM) + trading day
        id: trading_day
        run: |
          python - <<'EOF'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          # workflow_dispatch (manual trigger) bypasses window check
          is_manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"

          et_now = datetime.now(ZoneInfo("America/New_York"))
          et_minutes = et_now.hour * 60 + et_now.minute
          in_window = 540 <= et_minutes <= 1020  # 9:00 AM – 5:00 PM ET

          if is_manual:
              should_run = True
              print(f"Manual trigger — forcing run (ET: {et_now.strftime('%H:%M')})")
          else:
              should_run = in_window
              print(f"ET: {et_now.strftime('%H:%M')} | in window: {in_window} | will run: {should_run}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_trading_day={'true' if should_run else 'false'}\n")
          EOF

      - name: Run scraper (retry on failure)
        if: steps.trading_day.outputs.is_trading_day == 'true'
        env:
          CI: true
        run: |
          for attempt in 1 2 3; do
            echo "=== Scraper attempt $attempt / 3 ==="
            if python scraper.py; then
              echo "Scraper OK"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Failed — waiting 2 minutes before retry..."
              sleep 120
            fi
          done
          echo "Scraper failed after 3 attempts"
          exit 1

      - name: Run supplementary data scripts
        if: steps.trading_day.outputs.is_trading_day == 'true'
        continue-on-error: true
        env:
          CI: true
          IBKR_HOST: ${{ secrets.IBKR_HOST }}
          IBKR_PORT: ${{ secrets.IBKR_PORT }}
        run: |
          python earnings_calendar.py  || echo "earnings_calendar.py failed (non-fatal)"
          python econ_calendar.py      || echo "econ_calendar.py failed (non-fatal)"
          python market_internals.py   || echo "market_internals.py failed (non-fatal)"
          python ibkr_themes.py        || echo "ibkr_themes.py failed (non-fatal)"
          python breadth_monitor.py         || echo "breadth_monitor.py failed (non-fatal)"
          python breadth_stocks_builder.py  || echo "breadth_stocks_builder.py failed (non-fatal)"

      - name: Commit thematic data to repo
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/thematic_data.json \
                     public/earnings_calendar.json \
                     public/econ_calendar.json \
                     public/market_internals.json \
                     public/ibkr_themes.json \
                     2>/dev/null || true
          echo "=== Staged files ==="
          git diff --staged --stat
          git diff --staged --quiet || git commit -m "data: thematic_data $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
          for i in 1 2 3; do git pull --rebase --autostash && git push && break || sleep 5; done

      - uses: actions/setup-node@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          node-version: 18

      - name: Cache npm
        if: steps.trading_day.outputs.is_trading_day == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-

      - name: Build React app
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: npm ci --legacy-peer-deps && npm run build
        env:
          CI: false
          REACT_APP_FINNHUB_KEY: ${{ secrets.FINNHUB_API_KEY }}
          REACT_APP_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

      - uses: actions/configure-pages@v4
        if: steps.trading_day.outputs.is_trading_day == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.trading_day.outputs.is_trading_day == 'true'
        with:
          path: ./build

      - id: deployment
        if: steps.trading_day.outputs.is_trading_day == 'true'
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure()
        run: |
          gh issue create \
            --title "⚠️ Thematic Scanner 失敗 $(date -u +%Y-%m-%dT%H:%M)" \
            --body "爬蟲或部署失敗，網頁未更新。請查看：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

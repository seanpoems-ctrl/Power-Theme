# GitHub 有時會跳過不活躍 repo 的 cron job
# 這個 workflow 每天在 gapper 之前跑，確保 repo 保持活躍
name: Keep Alive

on:
  workflow_dispatch: {}
  # Schedule removed — triggered externally via cron-job.org
  # 10:00 UTC = 6:00 AM ET (EDT) — before gapper at 8:05 AM ET

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ping repo to keep scheduled workflows alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive $(date -u +%Y-%m-%d) [skip ci]"
          git push
